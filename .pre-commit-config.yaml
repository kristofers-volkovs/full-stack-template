default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
    -   id: trailing-whitespace
        exclude: ^frontend/src/client/.*
    -   id: end-of-file-fixer
        exclude: |
            (?x)^(
                uv.lock|
                frontend/src/client/.*|
                backend/src/email/templates/build/.*
            )$
    -   id: check-toml
    -   id: check-yaml
        args:
          - --unsafe
    -   id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.3
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: "./backend/scripts/run_mypy"
        language: system
        types: [python]
        require_serial: true
        verbose: true
